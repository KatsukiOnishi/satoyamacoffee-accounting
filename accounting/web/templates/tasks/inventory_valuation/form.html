{% extends "base.html" %}
{% block title %}月次在庫評価仕訳{% endblock %}
{% block content %}
<nav class="text-sm text-stone-500 mb-3"><a href="/" class="hover:underline">← ダッシュボード</a></nav>
<h1 class="text-2xl font-bold mb-1">月次在庫評価仕訳</h1>
<p class="text-stone-500 text-sm mb-6">
  対象月を選んで実行すると、当月末「商品 / 期末商品棚卸高」の振替伝票を作成します（前月計上があれば月初に逆仕訳も）。
</p>

<form action="/tasks/inventory-valuation/preview" method="post"
      class="bg-white rounded-2xl shadow-sm border border-stone-200 p-5 space-y-5">

  <div>
    <label class="block text-sm font-medium text-stone-700 mb-1">対象月 (YYYY-MM)</label>
    <input type="text" name="month" required pattern="\d{4}-\d{2}"
           value="{{ default_month }}"
           class="w-full rounded-lg border-stone-300 border px-3 py-2 font-mono">
    <p class="text-xs text-stone-400 mt-1">月末日を issue_date として計上します。</p>
  </div>

  <div>
    <label class="block text-sm font-medium text-stone-700 mb-1">評価額（円、空欄なら coffee_system から取得）</label>
    <input type="text" name="amount_override" inputmode="numeric"
           placeholder="例: 1234567"
           class="w-full rounded-lg border-stone-300 border px-3 py-2 font-mono">
    <p class="text-xs text-stone-400 mt-1">
      連携先: {{ coffee_system_url or "(未設定)" }} <br>
      coffee_system が応答しないときは手入力してください。
    </p>
  </div>

  <label class="flex items-center gap-2 text-sm">
    <input type="checkbox" name="dry_run" value="true" {% if dry_run %}checked{% endif %} class="rounded">
    <span>dry-run（freee に登録せずプレビューのみ）</span>
  </label>

  <div class="flex gap-3 pt-2">
    <button type="submit" class="px-4 py-2 rounded-lg bg-emerald-600 text-white text-sm font-medium hover:bg-emerald-500">
      プレビューする
    </button>
    <a href="/" class="px-4 py-2 rounded-lg border border-stone-300 text-sm text-stone-600 hover:bg-stone-100">キャンセル</a>
  </div>
</form>
{% endblock %}
