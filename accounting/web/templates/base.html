<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}さとやまコーヒー 月次決算ハブ{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body class="bg-stone-50 text-stone-800 min-h-screen flex flex-col">
  <header class="bg-white border-b border-stone-200">
    <div class="max-w-3xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="/" class="text-lg font-semibold tracking-tight">
        🌿 さとやまコーヒー <span class="text-stone-500 font-normal">月次決算ハブ</span>
      </a>
      <span class="text-xs text-stone-400">{% if dry_run %}DRY-RUN{% else %}LIVE{% endif %}</span>
    </div>
  </header>

  <main class="flex-1 max-w-3xl w-full mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>

  <footer class="border-t border-stone-200 bg-white">
    <div class="max-w-3xl mx-auto px-4 py-3 text-xs text-stone-400">
      実行時のみ起動・ローカル運用 / 合同会社秋田里山デザイン
    </div>
  </footer>
</body>
</html>
